<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diário do Aventureiro</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#b9854c;--bg2:#a3733e;--surface:#fbf1de;--surface2:#f3e1c4;--surface3:#e8cda1;
  --gold:#f3bd56;--gold-dim:#dc9a35;--gold-light:#ffd57e;--gold-pale:#fff3da;
  --ember:#ec6f63;--ember-bright:#f4877a;--ember-light:#ffb3a8;
  --teal:#57b3a3;--teal-bright:#6ec6b7;--teal-light:#a6e4d8;
  --purple:#a98ddb;--purple-light:#cdb6f2;
  --text:#5c4128;--text-dim:#a4825f;--text-faint:#d8bd97;
  --border:rgba(139,94,58,0.16);--border-mid:rgba(139,94,58,0.32);--border-strong:#b98a55;
  --shadow:0 6px 16px rgba(101,67,33,0.22);--radius:16px;
  --sidebar-w:64px;
}
html,body{height:100%;}
body{
  background-color:var(--bg);color:var(--text);
  font-family:'Quicksand',sans-serif;font-size:17px;line-height:1.5;min-height:100vh;
  background-image:
    radial-gradient(ellipse at 50% -10%,rgba(255,234,196,0.35) 0%,transparent 55%),
    repeating-linear-gradient(100deg,rgba(101,67,33,0.05) 0px,transparent 2px,transparent 46px,rgba(101,67,33,0.045) 48px),
    repeating-linear-gradient(0deg,rgba(255,255,255,0.04) 0px,transparent 3px,transparent 70px,rgba(101,67,33,0.04) 73px),
    linear-gradient(165deg,#cf9d68 0%,#bb8650 45%,#a87642 100%);
  background-attachment:fixed;
}

/* ── LAYOUT ROOT ── */
.root-layout{display:flex;min-height:100vh;}

/* ══════════════════════════════════════════
   LEFT SIDEBAR — QUICK ACTIONS
══════════════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);
  background:linear-gradient(180deg,#c79a64,#a87642);
  border-right:3px solid rgba(101,67,33,0.25);
  box-shadow:4px 0 14px rgba(101,67,33,0.18);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:12px;
  z-index:200;
}
.sidebar-logo{
  font-size:26px;margin-bottom:4px;
  filter:drop-shadow(0 2px 2px rgba(101,67,33,0.35));
}
.sidebar-sep{width:34px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25);margin:2px 0;}
.sidebar-btn{
  position:relative;width:42px;height:42px;
  border-radius:50%;border:2px solid var(--gold-dim);
  background:var(--surface);color:var(--text);
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 0 rgba(101,67,33,0.3);
  transition:all 0.12s;
}
.sidebar-btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 rgba(101,67,33,0.3);background:var(--gold-pale);}
.sidebar-btn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(101,67,33,0.3);}
.sidebar-btn.active{border-color:var(--gold-light);background:var(--gold-pale);}
.sidebar-tip{
  position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);
  background:var(--surface);border:2px solid var(--border-strong);
  color:var(--text);font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:10px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity 0.15s;letter-spacing:0.5px;
  box-shadow:0 3px 0 rgba(101,67,33,0.2);
}
.sidebar-btn:hover .sidebar-tip{opacity:1;}

/* ── MAIN CONTENT (offset by sidebar) ── */
.main-content{margin-left:var(--sidebar-w);flex:1;width:calc(100% - var(--sidebar-w));padding:20px 20px 70px 24px;display:flex;justify-content:center;}
#app{width:100%;max-width:980px;}

/* ══════════════════════════════════════════
   TOP BAR (header + char switcher)
══════════════════════════════════════════ */
.top-bar{
  display:flex;align-items:flex-start;justify-content:flex-end;
  gap:16px;margin-bottom:20px;
}
.app-header{text-align:center;flex:1;padding:24px 0 16px;}
.dragon-rule{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dragon-rule::before,.dragon-rule::after{content:'';flex:1;height:0;border-top:3px solid rgba(101,67,33,0.15);}
.dragon-rule span{font-size:26px;line-height:1;filter:drop-shadow(0 2px 2px rgba(101,67,33,0.35));}
.app-title{font-family:'Baloo 2',sans-serif;font-size:clamp(20px,4vw,34px);font-weight:800;color:var(--text);letter-spacing:1px;text-shadow:0 2px 0 rgba(255,255,255,0.4);margin-bottom:4px;}
.app-sub{font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;}

/* CHARACTER SWITCHER (top-right) */
.char-switcher-wrap{position:relative;flex-shrink:0;margin-top:20px;}
.char-switcher-btn{
  font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
  padding:10px 16px;border:2px solid var(--border-strong);
  background:var(--surface);color:var(--text);
  cursor:pointer;border-radius:14px;
  display:flex;align-items:center;gap:8px;
  transition:all 0.12s;white-space:nowrap;
  box-shadow:0 3px 0 rgba(101,67,33,0.25);
  min-width:150px;
}
.char-switcher-btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 rgba(101,67,33,0.25);background:var(--gold-pale);}
.char-switcher-btn.open{transform:translateY(1px);box-shadow:0 1px 0 rgba(101,67,33,0.25);}
.char-switcher-btn .char-name-display{flex:1;text-align:left;}
.char-switcher-btn .arrow{font-size:10px;color:var(--text-dim);transition:transform 0.15s;}
.char-switcher-btn.open .arrow{transform:rotate(180deg);}
.char-switcher-btn .hp-mini{font-size:10px;color:var(--text-dim);}

.char-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--surface);border:2px solid var(--border-strong);
  border-radius:14px;min-width:200px;
  box-shadow:0 8px 0 rgba(101,67,33,0.15),0 10px 24px rgba(101,67,33,0.3);
  z-index:500;overflow:hidden;
  animation:dropIn 0.15s ease;
}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.char-dropdown-item{
  font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
  padding:11px 16px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 0.1s;color:var(--text-dim);
  border-bottom:2px solid var(--border);
}
.char-dropdown-item:last-child{border-bottom:none;}
.char-dropdown-item:hover{background:var(--gold-pale);color:var(--text);}
.char-dropdown-item.active{color:var(--text);background:var(--surface2);}
.char-dropdown-item .char-drop-hp{font-size:11px;color:var(--text-faint);}
.char-dropdown-add{
  font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
  padding:11px 16px;cursor:pointer;
  color:var(--gold-dim);border-top:2px solid var(--border-mid);
  transition:background 0.1s;letter-spacing:0.5px;
  background:var(--gold-pale);
}
.char-dropdown-add:hover{background:var(--gold-light);color:var(--text);}
.tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:4px;font-family:'Baloo 2',sans-serif;}
.tag-dead{background:var(--ember);color:#fff;}
.tag-full{background:var(--teal);color:#fff;}

/* ══════════════════════════════════════════
   PANELS
══════════════════════════════════════════ */
.panel{background:var(--surface);border:2px solid var(--border-mid);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;margin-bottom:18px;box-shadow:0 5px 0 rgba(101,67,33,0.12),0 8px 18px rgba(101,67,33,0.15);}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to right,var(--gold),var(--teal-bright),var(--gold));opacity:0.55;}
.panel-title{font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:800;color:var(--text);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;display:flex;align-items:center;gap:8px;}

/* ── COLLAPSIBLE DANGER PANEL ── */
.danger-panel{background:var(--surface);border:2px solid var(--ember);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;position:relative;box-shadow:0 5px 0 rgba(101,67,33,0.12),0 8px 18px rgba(101,67,33,0.15);}
.danger-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(45deg,var(--ember) 0 10px,var(--gold-pale) 10px 20px);opacity:0.85;}
.danger-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:transparent;border:none;
  font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:800;
  color:var(--ember);letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;text-align:left;transition:background 0.15s;
}
.danger-toggle:hover{background:var(--gold-pale);}
.danger-toggle .dtoggle-left{display:flex;align-items:center;gap:8px;}
.danger-toggle .dtoggle-arrow{font-size:10px;color:var(--ember);transition:transform 0.2s;}
.danger-toggle.open .dtoggle-arrow{transform:rotate(180deg);}
.danger-body{padding:0 20px 20px;display:none;}
.danger-body.open{display:block;}

/* ── COLLAPSIBLE REST PANEL ── */
.rest-panel{background:var(--surface);border:2px solid var(--border-mid);border-radius:var(--radius);margin-top:18px;margin-bottom:18px;overflow:hidden;position:relative;box-shadow:0 5px 0 rgba(101,67,33,0.12),0 8px 18px rgba(101,67,33,0.15);}
.rest-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to right,var(--teal),var(--purple-light),var(--teal));opacity:0.7;}
.rest-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:22px 20px 16px;background:transparent;border:none;
  font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:800;
  color:var(--teal);letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;text-align:left;transition:background 0.15s;
}
.rest-toggle:hover{background:var(--gold-pale);}
.rest-toggle .rtoggle-left{display:flex;align-items:center;gap:8px;}
.rest-toggle .rtoggle-arrow{font-size:10px;color:var(--teal);transition:transform 0.2s;}
.rest-toggle.open .rtoggle-arrow{transform:rotate(180deg);}
.rest-body{padding:0 20px 20px;display:none;}
.rest-body.open{display:block;}

/* ══════════════════════════════════════════
   SECTION DIVIDERS
══════════════════════════════════════════ */
.section-divider{display:flex;align-items:center;gap:14px;margin:28px 0 16px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:0;border-top:3px solid rgba(101,67,33,0.15);}
.section-divider-label{font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;text-transform:uppercase;white-space:nowrap;background:var(--ember);padding:7px 20px;border-radius:20px;border:2px solid rgba(101,67,33,0.15);box-shadow:0 3px 0 rgba(101,67,33,0.18);}
.divider-icon{font-size:16px;filter:drop-shadow(0 2px 1px rgba(101,67,33,0.3));}

/* ══════════════════════════════════════════
   FORM
══════════════════════════════════════════ */
.field-label{font-family:'Baloo 2',sans-serif;font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.field-input{width:100%;background:var(--surface2);border:2px solid var(--border-mid);color:var(--text);font-family:'Quicksand',sans-serif;font-weight:600;font-size:16px;padding:9px 12px;border-radius:10px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
.field-input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(243,189,86,0.25);}
.field-input::placeholder{color:var(--text-faint);}
select.field-input{cursor:pointer;}
select.field-input option{background:var(--surface2);}
textarea.field-input{resize:vertical;min-height:90px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.span-full{grid-column:1/-1;}
.small-input{width:72px;background:var(--surface2);border:2px solid var(--border-mid);color:var(--text);font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;text-align:center;padding:7px 4px;border-radius:10px;outline:none;}
.small-input:focus{border-color:var(--gold-dim);}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;padding:10px 18px;border-radius:12px;cursor:pointer;border:2px solid;transition:transform 0.1s,box-shadow 0.1s,filter 0.1s;letter-spacing:0.3px;white-space:nowrap;box-shadow:0 4px 0 rgba(101,67,33,0.22);}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 5px 0 rgba(101,67,33,0.22);}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(101,67,33,0.22);}
.btn-damage{background:var(--ember);border-color:#d9554a;color:#fff;}
.btn-damage:hover{background:var(--ember-bright);}
.btn-heal{background:var(--teal);border-color:#3f8f80;color:#fff;}
.btn-heal:hover{background:var(--teal-bright);}
.btn-ghost{background:var(--surface2);border-color:var(--border-mid);color:var(--text-dim);box-shadow:0 3px 0 rgba(101,67,33,0.12);}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);}
.btn-gold{background:var(--gold);border-color:var(--gold-dim);color:#6a431a;font-weight:800;}
.btn-gold:hover{background:var(--gold-light);}
.btn-danger{background:var(--gold-pale);border-color:var(--ember);color:var(--ember);}
.btn-danger:hover{background:var(--ember);color:#fff;}
.btn-short{background:var(--teal-light);border-color:var(--teal-bright);color:#2f6f63;}
.btn-short:hover{background:var(--teal-bright);color:#fff;}
.btn-long{background:var(--purple-light);border-color:var(--purple);color:#5c3f8f;}
.btn-long:hover{background:var(--purple);color:#fff;}
.btn-sm{padding:6px 12px;font-size:11px;box-shadow:0 3px 0 rgba(101,67,33,0.22);}
.btn-edit{background:var(--gold-pale);border-color:var(--gold-dim);color:#9c6a23;}
.btn-edit:hover{background:var(--gold-light);color:#6a431a;}
.icon-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border-mid);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:18px;font-family:'Baloo 2',sans-serif;font-weight:800;transition:all 0.12s;display:inline-flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 3px 0 rgba(101,67,33,0.18);}
.icon-btn:hover{border-color:var(--gold-dim);color:var(--text);background:var(--gold-pale);transform:translateY(-1px);}
.icon-btn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(101,67,33,0.18);}

/* ══════════════════════════════════════════
   HP
══════════════════════════════════════════ */
.hp-main{display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:16px;}
.hp-orb-wrap{position:relative;flex-shrink:0;}
.hp-orb{
  width:130px;height:130px;border-radius:50%;
  background:var(--surface2);
  flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 0 rgba(101,67,33,0.15), inset 0 2px 8px rgba(101,67,33,0.08);
}
.hp-orb-inner{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hp-current{font-family:'Baloo 2',sans-serif;font-size:32px;font-weight:800;line-height:1;color:var(--text);}
.hp-slash{font-size:12px;color:var(--text-dim);font-weight:700;line-height:1.2;}
.hp-orb-label{font-family:'Baloo 2',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-top:2px;}
.hp-pct-label{font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:800;margin-top:4px;letter-spacing:0.5px;}
.hp-controls{flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;}
.hp-btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hp-temp-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-dim);font-weight:600;flex-wrap:wrap;}
.hp-set-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-top:4px;}
.hp-set-label{font-size:14px;color:var(--text-dim);font-weight:600;white-space:nowrap;}

/* ══════════════════════════════════════════
   CHARACTER SHEET HEADER (Identidade + Vida + Dinheiro)
══════════════════════════════════════════ */
.sheet-header-body{display:grid;grid-template-columns:1fr 1fr auto;gap:0 24px;align-items:start;}
.sheet-identity{grid-column:1/3;}
.identity-name{font-family:'Baloo 2',sans-serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:8px;word-break:break-word;}
.identity-meta{font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;}
.identity-bio{margin-top:16px;}
.identity-bio-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.identity-bio-label{font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:800;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.sheet-divider{display:none;}
.sheet-col3{grid-column:3;display:flex;flex-direction:column;gap:14px;align-items:center;}
.sheet-vida{display:flex;flex-direction:column;align-items:center;gap:8px;}
.vida-stats{display:flex;flex-direction:column;gap:4px;align-items:center;}
.temp-hp-display{font-size:12px;color:#2f8f7e;font-family:'Baloo 2',sans-serif;font-weight:800;letter-spacing:0.5px;}
.sheet-money{width:100%;}
.sheet-money-box{background:var(--surface2);border:2px solid var(--border-mid);border-radius:14px;padding:12px 16px;text-align:center;box-shadow:0 3px 0 rgba(101,67,33,0.12);}
.sheet-money-label{font-family:'Baloo 2',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
.sheet-money-amount{font-family:'Baloo 2',sans-serif;font-size:26px;font-weight:800;color:var(--text);}
.sheet-money-unit{font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;color:var(--text-dim);margin-left:4px;}

/* ══════════════════════════════════════════
   BIOGRAFIA
══════════════════════════════════════════ */
.bio-display{white-space:pre-wrap;color:var(--text);font-size:16px;font-weight:500;line-height:1.6;}
.bio-empty{color:var(--text-faint);font-style:italic;}

/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
.tokens-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.tokens-header-btns{display:flex;gap:8px;}
.token-list{display:flex;flex-direction:column;gap:10px;}
.token-card{background:var(--surface2);border:2px solid var(--border-mid);border-radius:14px;padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;transition:border-color 0.15s;box-shadow:0 3px 0 rgba(101,67,33,0.1);}
.token-card:hover{border-color:var(--border-strong);}
.token-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:2px solid rgba(101,67,33,0.2);}
.token-name{font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:700;color:var(--text);flex:1;min-width:80px;}
.token-desc{font-size:12px;color:var(--text-dim);flex-basis:100%;margin-top:-4px;}
.token-controls{display:flex;align-items:center;gap:8px;margin-left:auto;}
.token-count{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:800;color:var(--text);min-width:36px;text-align:center;}
.token-max-lbl{font-size:12px;color:var(--text-dim);font-weight:600;}
.token-pips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;flex-basis:100%;align-items:center;}
.token-pip{width:20px;height:20px;border-radius:6px;border:3px solid;cursor:pointer;transition:all 0.1s;flex-shrink:0;}
.token-pip.used{opacity:0.2;}
.token-actions{display:flex;gap:6px;margin-left:auto;align-items:center;}
.color-options{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:26px;height:26px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
.color-opt.selected{border-color:var(--text);transform:scale(1.15);}

/* ══════════════════════════════════════════
   REST
══════════════════════════════════════════ */
.rest-cards{display:flex;gap:14px;flex-wrap:wrap;}
.rest-card{flex:1;min-width:220px;background:var(--surface2);border:2px solid var(--border-mid);border-radius:14px;padding:18px;box-shadow:0 3px 0 rgba(101,67,33,0.1);}
.rest-card-title{font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.rest-row{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:10px;flex-wrap:wrap;}
.rest-input{width:58px;background:var(--surface);border:2px solid var(--border-mid);color:var(--text);font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;text-align:center;padding:5px 4px;border-radius:8px;outline:none;}
.rest-input:focus{border-color:var(--gold-dim);}
.short-token-select{margin-top:12px;padding-top:12px;border-top:3px solid var(--border-mid);}
.short-token-select-title{font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}
.short-tok-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.short-tok-name{font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:80px;display:flex;align-items:center;gap:6px;}
.short-tok-sel{background:var(--surface);border:2px solid var(--border-mid);color:var(--text);font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px;padding:5px 9px;border-radius:8px;outline:none;cursor:pointer;}
.short-tok-sel:focus{border-color:var(--gold-dim);}

/* ══════════════════════════════════════════
   MODALS (popup)
══════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(80,53,26,0.55);
  z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(2px);animation:fadeIn 0.15s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--surface);border:3px solid var(--border-strong);
  border-radius:20px;padding:0;max-width:480px;width:100%;
  max-height:90vh;display:flex;flex-direction:column;
  position:relative;box-shadow:0 8px 0 rgba(101,67,33,0.18),0 16px 40px rgba(101,67,33,0.35);
  animation:slideUp 0.18s ease;
}
.modal-inner{overflow-y:auto;padding:32px 28px 0;flex:1;overscroll-behavior:contain;}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:10px;border-radius:17px 17px 0 0;background:linear-gradient(to right,var(--gold),var(--teal-bright),var(--ember),var(--gold));z-index:1;pointer-events:none;}
.modal-title{font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:0.5px;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid var(--border-mid);display:flex;align-items:center;gap:10px;padding-top:10px;}
.modal-close{position:absolute;top:-14px;right:-14px;width:30px;height:30px;border-radius:50%;background:var(--ember);border:3px solid var(--surface);color:#fff;cursor:pointer;font-size:14px;font-weight:800;transition:transform 0.12s;line-height:1;box-shadow:0 3px 0 rgba(101,67,33,0.25);display:flex;align-items:center;justify-content:center;z-index:2;}
.modal-close:hover{transform:scale(1.1) rotate(90deg);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 28px 20px;flex-shrink:0;}

/* delete modal specifically */
.delete-modal-body{text-align:center;padding:10px 0 4px;}
.delete-modal-icon{font-size:40px;margin-bottom:12px;filter:drop-shadow(0 3px 2px rgba(101,67,33,0.3));}
.delete-modal-msg{font-size:16px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.delete-modal-name{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;}
.delete-modal-warn{font-size:13px;color:var(--text-faint);font-weight:600;}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface);border:2px solid var(--border-strong);color:var(--text);font-family:'Quicksand',sans-serif;font-weight:700;font-size:15px;padding:13px 24px;border-radius:14px;z-index:1000;pointer-events:none;box-shadow:0 5px 0 rgba(101,67,33,0.18),var(--shadow);animation:slideUp 0.2s ease;max-width:300px;}

/* ══════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════ */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;}

/* ══════════════════════════════════════════
   INVENTORY PANEL
══════════════════════════════════════════ */
.tokens-inventory-row{display:grid;grid-template-columns:1fr 2fr;gap:18px;align-items:start;}
.tokens-inventory-row .panel{margin-bottom:0;}
.inventory-panel{background:var(--surface);border:2px solid var(--border-mid);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;box-shadow:0 5px 0 rgba(101,67,33,0.12),0 8px 18px rgba(101,67,33,0.15);}
.inventory-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to right,var(--gold),var(--purple-light),var(--gold));opacity:0.55;}
.inventory-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:10px;max-height:460px;overflow-y:auto;}
.inventory-item{display:flex;flex-direction:column;align-items:center;text-align:center;aspect-ratio:4/5;background:var(--surface2);border:2px solid var(--border-mid);border-radius:14px;padding:13px 10px 10px;transition:border-color 0.15s,box-shadow 0.15s;box-shadow:0 3px 0 rgba(101,67,33,0.1);cursor:pointer;position:relative;overflow:hidden;}
.inventory-item::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(to right,var(--gold),var(--purple-light));opacity:0.6;border-radius:12px 12px 0 0;}
.inventory-item:hover{border-color:var(--border-strong);box-shadow:0 5px 0 rgba(101,67,33,0.15);}
.inventory-item-name{font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:800;color:var(--text);line-height:1.2;margin-top:4px;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.inventory-item-icon{font-size:32px;margin:auto 0;line-height:1;}
.inventory-item-cat{font-family:'Baloo 2',sans-serif;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);margin-top:2px;}
.inventory-item-desc{font-size:10px;color:var(--text-dim);font-weight:600;margin-top:3px;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;}
.inventory-item-qty-badge{position:absolute;top:6px;right:6px;background:var(--gold);color:#6a431a;font-family:'Baloo 2',sans-serif;font-size:10px;font-weight:800;border-radius:8px;padding:1px 6px;line-height:1.5;}
.inventory-item-del{background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:14px;padding:2px 4px;border-radius:6px;transition:color 0.12s,background 0.12s;line-height:1;}
.inventory-item-del:hover{color:var(--ember);background:var(--gold-pale);}
.inventory-empty{text-align:center;padding:24px 0;color:var(--text-faint);font-size:13px;grid-column:1/-1;}
.inventory-gold-total{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;}

/* ── EMOJI PICKER ── */
.emoji-picker-wrap{grid-column:1/-1;}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:700px){
  :root{--sidebar-w:52px;}
  .main-content{padding:12px 10px 60px 12px;}
  .form-grid{grid-template-columns:1fr;}
  .rest-cards{flex-direction:column;}

  .hp-orb{width:100px;height:100px;}
  .hp-current{font-size:26px;}
  .tokens-inventory-row{flex-direction:column;}
  .inventory-panel{width:100%;}
}

<script>
/* ══════════════════════════════════════════
   DATA / STATE
══════════════════════════════════════════ */
const TOKEN_COLORS=['#c8973a','#d4410f','#26907a','#9060d0','#2980b9','#e67e22','#27ae60','#e91e63','#607d8b','#ff5722'];

function uid(){return Math.random().toString(36).slice(2,9);}

function newChar(){
  return{id:uid(),name:'Novo Aventureiro',race:'',class_:'',level:'1',
    maxHP:20,currentHP:20,tempHP:0,money:0,tokens:[],inventory:[],
    restConfig:{shortHP:5,longHP:0,longFullTokens:true},notes:''};
}
function newToken(){
  return{id:uid(),name:'Espaços de Magia',description:'',max:3,current:3,
    color:TOKEN_COLORS[0],shortRestore:'0',longRestore:'full'};
}
function getHPColor(p){if(p>0.6)return'var(--teal-bright)';if(p>0.3)return'var(--gold)';return'var(--ember-light)';}

let S={
  chars:[],activeId:'',
  charDropOpen:false,
  editTokenId:null,   // token being edited
  newTok:newToken(),
  editTokData:null,
  dangerOpen:false,
  restOpen:false,
  // inventory modals
  showAddInvModal:false,newInvItem:null,
  showEditInvModal:false,editInvId:null,editInvData:null,
  // modals
  showDeleteModal:false,
  showAddTokenModal:false,
  showEditTokenModal:false,
  showEditCharModal:false,editCharData:null,
  showDamageModal:false,damageAmount:'',
  showHealModal:false,healAmount:'',
  showMoneyModal:false,moneyAmount:'',moneyType:'add',
  showRestConfirmModal:false,restConfirmType:null,
};

function load(){
  try{const s=localStorage.getItem('dnd_pt_v3');if(s){const p=JSON.parse(s);S.chars=p.chars||[];S.activeId=p.activeId||'';}
  }catch(e){}
  S.chars.forEach(c=>{if(typeof c.money!=='number')c.money=0;if(!c.inventory)c.inventory=[];});
  if(S.chars.length&&!S.chars.find(c=>c.id===S.activeId))S.activeId=S.chars[0].id;
}
function save(){localStorage.setItem('dnd_pt_v3',JSON.stringify({chars:S.chars,activeId:S.activeId}));}
function getChar(){return S.chars.find(c=>c.id===S.activeId)||S.chars[0];}
function updateChar(patch){const c=getChar();if(!c)return;Object.assign(c,patch);save();render();}

/* ── TOAST ── */
let toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.display='none';},2700);}

/* ── ACTIONS ── */
function changeHP(delta){
  const c=getChar();
  const origTemp=c.tempHP;
  let eff=delta,temp=origTemp;
  if(delta<0&&temp>0){const a=Math.min(temp,-delta);temp-=a;eff+=a;}
  const next=Math.max(0,Math.min(c.maxHP,c.currentHP+eff));
  updateChar({currentHP:next,tempHP:temp});
  const ab=origTemp-temp;
  if(delta<0)showToast(`${-delta} dano recebido${ab>0?` (${ab} absorvido por HP temp.)`:''}`)
  else showToast(`+${delta} HP curado`);
}

function doShortRest(){
  const c=getChar();
  const newHP=Math.min(c.maxHP,c.currentHP+(c.restConfig.shortHP||0));
  const newTokens=c.tokens.map(t=>{
    const sr=t.shortRestore;
    if(sr==='full')return{...t,current:t.max};
    const g=parseInt(sr)||0;
    return{...t,current:Math.min(t.max,t.current+g)};
  });
  updateChar({currentHP:newHP,tokens:newTokens});
  showToast(`Descanso Curto: +${c.restConfig.shortHP||0} HP, recursos restaurados!`);
}
function doLongRest(){
  const c=getChar();
  const hg=c.restConfig.longHP===0?c.maxHP:c.restConfig.longHP;
  const newHP=Math.min(c.maxHP,c.currentHP+hg);
  const newTokens=c.tokens.map(t=>{
    if(c.restConfig.longFullTokens)return{...t,current:t.max};
    if(t.longRestore==='full')return{...t,current:t.max};
    return{...t,current:Math.min(t.max,t.current+(parseInt(t.longRestore)||0))};
  });
  updateChar({currentHP:newHP,tokens:newTokens,tempHP:0});
  showToast('Descanso Longo: totalmente restaurado!');
}
function toggleDanger(){S.dangerOpen=!S.dangerOpen;render();}
function toggleRest(){S.restOpen=!S.restOpen;render();}

function addChar(){const c=newChar();S.chars.push(c);S.activeId=c.id;S.charDropOpen=false;save();render();}
function switchChar(id){S.activeId=id;S.charDropOpen=false;save();render();}
function deleteChar(){
  if(S.chars.length===1){showToast('Não podes apagar o teu único personagem!');closeModal();return;}
  S.chars=S.chars.filter(c=>c.id!==S.activeId);
  S.activeId=S.chars[0].id;
  closeModal();save();render();
  showToast('Personagem apagado.');
}
function adjustToken(tid,delta){
  const c=getChar();
  updateChar({tokens:c.tokens.map(t=>t.id===tid?{...t,current:Math.max(0,Math.min(t.max,t.current+delta))}:t)});
}
function pipClick(tid,idx){
  const c=getChar();
  updateChar({tokens:c.tokens.map(t=>{
    if(t.id!==tid)return t;
    const nv=idx<t.current?idx:idx+1;
    return{...t,current:Math.max(0,Math.min(t.max,nv))};
  })});
}
function setTokenFull(tid){const c=getChar();updateChar({tokens:c.tokens.map(t=>t.id===tid?{...t,current:t.max}:t)});}
function removeToken(tid){const c=getChar();updateChar({tokens:c.tokens.filter(t=>t.id!==tid)});}
function updateTokenShortRestore(tid,val){const c=getChar();updateChar({tokens:c.tokens.map(t=>t.id===tid?{...t,shortRestore:val}:t)});}

/* ── MODALS ── */
function closeModal(){
  S.showDeleteModal=false;S.showAddTokenModal=false;S.showEditTokenModal=false;
  S.showEditCharModal=false;S.editCharData=null;
  S.showDamageModal=false;S.damageAmount='';
  S.showHealModal=false;S.healAmount='';
  S.showMoneyModal=false;S.moneyAmount='';S.moneyType='add';
  S.showRestConfirmModal=false;S.restConfirmType=null;
  S.editTokenId=null;S.editTokData=null;
  S.showAddInvModal=false;S.newInvItem=null;
  S.showEditInvModal=false;S.editInvId=null;S.editInvData=null;
  renderModal();
}
function openDeleteModal(){S.showDeleteModal=true;renderModal();}
function openAddTokenModal(){S.newTok=newToken();S.showAddTokenModal=true;renderModal();}

/* Edit character (identity + vida + dinheiro) */
function openEditCharModal(){
  const c=getChar();
  S.editCharData={name:c.name,race:c.race,class_:c.class_,level:c.level,
    maxHP:c.maxHP,currentHP:c.currentHP,tempHP:c.tempHP,money:c.money,notes:c.notes||''};
  S.showEditCharModal=true;renderModal();
}
function saveEditChar(){
  const d=S.editCharData;
  const maxHP=Math.max(1,parseInt(d.maxHP)||1);
  const currentHP=Math.max(0,Math.min(maxHP,parseInt(d.currentHP)||0));
  const tempHP=Math.max(0,parseInt(d.tempHP)||0);
  const money=Math.max(0,parseFloat(d.money)||0);
  updateChar({name:d.name.trim()||'Aventureiro',race:d.race,class_:d.class_,level:d.level,
    maxHP,currentHP,tempHP,money,notes:d.notes});
  closeModal();showToast('Personagem atualizado!');
}


/* Quick action: Dano */
function openDamageModal(){S.damageAmount='';S.showDamageModal=true;renderModal();}
function confirmDamage(){
  const v=Math.max(0,parseInt(S.damageAmount)||0);
  if(v<=0){showToast('Indica uma quantidade de dano.');return;}
  changeHP(-v);
  closeModal();
}

/* Quick action: Cura */
function openHealModal(){S.healAmount='';S.showHealModal=true;renderModal();}
function confirmHeal(){
  const v=Math.max(0,parseInt(S.healAmount)||0);
  if(v<=0){showToast('Indica uma quantidade de cura.');return;}
  changeHP(v);
  closeModal();
}

/* Quick action: Dinheiro */
function openMoneyModal(){S.moneyAmount='';S.moneyType='add';S.showMoneyModal=true;renderModal();}
function confirmMoney(){
  const v=Math.max(0,parseFloat(S.moneyAmount)||0);
  if(v<=0){showToast('Indica uma quantidade de dinheiro.');return;}
  const c=getChar();
  const delta=S.moneyType==='add'?v:-v;
  const next=Math.max(0,(c.money||0)+delta);
  updateChar({money:next});
  showToast(S.moneyType==='add'?`+${v} PO recebidas!`:`−${v} PO gastas!`);
  closeModal();
}

/* Quick action: Descanso (confirmação) */
function openRestConfirm(type){S.restConfirmType=type;S.showRestConfirmModal=true;renderModal();}
function confirmRest(){
  const type=S.restConfirmType;
  closeModal();
  if(type==='short')doShortRest();
  else if(type==='long')doLongRest();
}

function openEditTokenModal(tid){
  const c=getChar();const tok=c.tokens.find(t=>t.id===tid);
  if(!tok)return;
  S.editTokenId=tid;S.editTokData={...tok};
  S.showEditTokenModal=true;renderModal();
}
function saveEditToken(){
  const c=getChar();
  const d=S.editTokData;
  d.max=Math.max(1,parseInt(d.max)||1);
  d.current=Math.min(d.current,d.max);
  updateChar({tokens:c.tokens.map(t=>t.id===S.editTokenId?{...d}:t)});
  closeModal();showToast(`${d.name} atualizado!`);
}
function confirmAddToken(){
  const t=S.newTok;
  if(!t.name.trim()){showToast('Dá um nome ao token!');return;}
  const tok={...t,id:uid(),max:parseInt(t.max)||1,current:parseInt(t.max)||1};
  const c=getChar();
  updateChar({tokens:[...c.tokens,tok]});
  closeModal();showToast(`${tok.name} adicionado!`);
}

/* ══════════════════════════════════════════
   MINI BUILDER (pure DOM, no vdom)
══════════════════════════════════════════ */
function el(tag,cls,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  return e;
}

function mkInput(cls,attrs,onChange){
  const e=el('input',cls,attrs);
  if(attrs&&attrs.value!==undefined)e.value=attrs.value;
  if(onChange)e.addEventListener('input',onChange);
  return e;
}
function mkSelect(cls,opts,selected,onChange){
  const e=el('select',cls);
  opts.forEach(([v,l])=>{const o=el('option','',{value:v});o.textContent=l;if(String(v)===String(selected))o.selected=true;e.appendChild(o);});
  if(onChange)e.addEventListener('change',onChange);
  return e;
}
function mkBtn(cls,label,onClick){const b=el('button',cls,{onclick:onClick});b.innerHTML=label;return b;}

  nameWrap.append(nameLabel,nameInp);

  descWrap.append(descLabel,descInp);

  // Short restore
  const srWrap=el('div');
  const srLabel=el('div','field-label');srLabel.textContent='Restaurar — Descanso Curto';
  const srOpts=[['0','Nenhum'],['full','Todos'],...[1,2,3,4,5,6,7,8].map(n=>[String(n),String(n)])];
  const srSel=mkSelect('field-input',srOpts,data.shortRestore,e=>{data.shortRestore=e.target.value;setData({...data,shortRestore:e.target.value});});
  srWrap.append(srLabel,srSel);

  // Long restore
  const lrWrap=el('div');
  const lrLabel=el('div','field-label');lrLabel.textContent='Restaurar — Descanso Longo';
  const lrOpts=[['full','Todos'],['0','Nenhum'],...[1,2,3,4,5,6,7,8].map(n=>[String(n),String(n)])];
  const lrSel=mkSelect('field-input',lrOpts,data.longRestore,e=>{data.longRestore=e.target.value;setData({...data,longRestore:e.target.value});});

  // Color
  const colorWrap=el('div','span-full');
  const colorLabel=el('div','field-label',{style:{marginBottom:'8px'}});colorLabel.textContent='Cor';
  const colorOpts=el('div','color-options');

    const dot=el('div',`color-opt${data.color===c?' selected':''}`);
    dot.style.background=c;
    dot.addEventListener('click',()=>{data.color=c;setData({...data,color:c});renderModal();});
    colorOpts.appendChild(dot);
  });
  colorWrap.append(colorLabel,colorOpts);

  grid.append(nameWrap,maxWrap,descWrap,srWrap,lrWrap,colorWrap);
  return grid;
}

/* ── INVENTORY ── */
const INV_CATEGORIES=['Arma','Armadura','Ferramenta','Consumível','Poção','Equipamento','História'];

function newInvItem(){return{id:uid(),name:'',category:'Equipamento',qty:1,description:''};}

function openAddInvModal(){S.newInvItem=newInvItem();S.showAddInvModal=true;renderModal();}
function openEditInvModal(id){
  const c=getChar();const item=c.inventory.find(i=>i.id===id);
  if(!item)return;
  S.editInvId=id;S.editInvData={...item};
  S.showEditInvModal=true;renderModal();
}
function confirmAddInv(){
  const d=S.newInvItem;
  if(!d.name.trim()){showToast('Dá um nome ao item!');return;}
  const item={...d,id:uid(),name:d.name.trim(),qty:Math.max(1,parseInt(d.qty)||1)};
  const c=getChar();
  updateChar({inventory:[...c.inventory,item]});
  closeModal();showToast(`${item.name} adicionado ao inventário!`);
}
function saveEditInv(){
  const d=S.editInvData;
  if(!d.name.trim()){showToast('O item precisa de um nome!');return;}
  d.qty=Math.max(1,parseInt(d.qty)||1);
  const c=getChar();
  updateChar({inventory:c.inventory.map(i=>i.id===S.editInvId?{...d}:i)});
  closeModal();showToast(`${d.name} atualizado!`);
}
function removeInventoryItem(id){
  const c=getChar();
  updateChar({inventory:c.inventory.filter(i=>i.id!==id)});
}
function changeInventoryQty(id,delta){
  const c=getChar();
  updateChar({inventory:c.inventory.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+delta)}:i)});
}

function getItemIcon(cat,name,emoji){
  if(emoji)return emoji;
  const n=(name||'').toLowerCase();
  if(cat==='Arma'||n.includes('espada')||n.includes('arco')||n.includes('adaga'))return'⚔️';
  if(cat==='Armadura'||n.includes('escudo')||n.includes('armadura'))return'🛡️';
  if(cat==='Poção'||n.includes('poção'))return'🧪';
  if(cat==='Pergaminho'||n.includes('pergaminho'))return'📜';
  if(cat==='Ferramenta'||n.includes('ferramenta'))return'🔧';
  if(cat==='Tesouro'||n.includes('gema')||n.includes('ouro'))return'💎';
  if(cat==='Consumível')return'🕯️';
  if(cat==='Equipamento')return'🎒';
  return'📦';
}

  const qtyWrap=el('div');

async function loadXLSX(){
  if(window.XLSX)return;
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

async function doExportExcel(sessionLabel){
  const btn=document.getElementById('btn-export');
  if(btn){btn.disabled=true;btn.style.opacity='0.5';}
  showToast('A preparar exportação… ⏳');
  try{
    await loadXLSX();
    // Serialize entire state to a single JSON string stored in cell A1
    const payload=JSON.stringify({chars:S.chars,activeId:S.activeId,exportedAt:new Date().toISOString(),session:sessionLabel});
    const wb=XLSX.utils.book_new();
    const wsData=[
      ['Diário do Aventureiro — '+sessionLabel],
      ['Exportado em',new Date().toLocaleString('pt-PT')],
      [''],
      ['DADOS (não editar)'],
      [payload]
    ];
    const ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:120}];
    XLSX.utils.book_append_sheet(wb,ws,'Sessão');

    // Also add a human-readable summary sheet
    const c=getChar();
    const summaryRows=[
      ['Personagem','Raça','Classe','Nível','HP Atual','HP Máximo','HP Temp','Dinheiro (PO)','Notas'],
    ];
    S.chars.forEach(ch=>{
      summaryRows.push([ch.name,ch.race,ch.class_,ch.level,ch.currentHP,ch.maxHP,ch.tempHP,ch.money||0,ch.notes||'']);
    });
    const wsSummary=XLSX.utils.aoa_to_sheet(summaryRows);
    wsSummary['!cols']=[{wch:20},{wch:14},{wch:16},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14},{wch:40}];
    XLSX.utils.book_append_sheet(wb,wsSummary,'Resumo');

    XLSX.writeFile(wb,`${sessionLabel}.xlsx`);
    showToast('Sessão exportada com sucesso! 📊');
  }catch(err){
    showToast('Erro ao exportar. Tenta novamente.');
    console.error(err);
  }finally{
    if(btn){btn.disabled=false;btn.style.opacity='';}
  }
}

async function handleImportFile(input){
  const file=input.files&&input.files[0];
  if(!file){return;}
  input.value=''; // reset so same file can be re-selected

  const btn=document.getElementById('btn-import');
  if(btn){btn.disabled=true;btn.style.opacity='0.5';}
  showToast('A importar… ⏳');

  try{
    await loadXLSX();
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});

    // Find the JSON payload (row with a string starting with '{"chars"')
    let payload=null;
    for(const row of rows){
      for(const cell of row){
        if(typeof cell==='string'&&cell.startsWith('{"chars"')){
          payload=cell;break;
        }
      }
      if(payload)break;
    }

    if(!payload){
      showToast('Ficheiro inválido ou sem dados reconhecíveis.');
      return;
    }

    const imported=JSON.parse(payload);
    if(!imported.chars||!Array.isArray(imported.chars)){
      showToast('Dados inválidos no ficheiro.');
      return;
    }

    // Show confirmation popup
    const sessionLabel=imported.session||'sessão importada';
    const charNames=imported.chars.map(c=>c.name).join(', ');
    showImportConfirm(sessionLabel,charNames,()=>{
      S.chars=imported.chars;
      S.activeId=imported.activeId||imported.chars[0].id;
      // Ensure data integrity
      S.chars.forEach(c=>{if(typeof c.money!=='number')c.money=0;if(!c.inventory)c.inventory=[];if(!c.tokens)c.tokens=[];if(!c.restConfig)c.restConfig={shortHP:5,longHP:0,longFullTokens:true};});
      if(!S.chars.find(c=>c.id===S.activeId))S.activeId=S.chars[0].id;
      save();render();
      showToast('Sessão importada com sucesso! ⚔️');
    });
  }catch(err){
    showToast('Erro ao importar. Verifica o ficheiro.');
    console.error(err);
  }finally{
    if(btn){btn.disabled=false;btn.style.opacity='';}
  }
}

  title.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importar Sessão`;

  const body=document.createElement('div');
  body.style.cssText='text-align:center;padding:8px 0 4px;';

  const icon=document.createElement('div');
  icon.style.cssText='font-size:36px;margin-bottom:12px;';
  icon.textContent='📥';

  const msgSession=document.createElement('div');
  msgSession.style.cssText=`font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;`;
  msgSession.textContent=sessionLabel;

  const msgChars=document.createElement('div');
  msgChars.style.cssText='font-size:14px;color:var(--text-dim);font-weight:600;margin-bottom:6px;';
  msgChars.textContent=`Personagens: ${charNames}`;

  const warn=document.createElement('div');
  warn.style.cssText='font-size:13px;color:var(--ember);font-weight:700;margin-top:10px;';
  warn.textContent='⚠️ Isto vai substituir todos os dados actuais.';

  body.append(icon,msgSession,msgChars,warn);
  inner.append(title,body);

  const footer=document.createElement('div');
  footer.style.cssText='display:flex;gap:10px;justify-content:flex-end;padding:16px 28px 22px;';

  const btnCancel=document.createElement('button');
  btnCancel.className='btn btn-ghost';btnCancel.textContent='Cancelar';
  btnCancel.onclick=()=>ov.remove();

  const btnOk=document.createElement('button');
  btnOk.className='btn btn-gold';
  btnOk.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importar';
  btnOk.onclick=()=>{ov.remove();onConfirm();};

  footer.append(btnCancel,btnOk);
  box.append(topBar,inner,footer);
  ov.appendChild(box);
  document.body.appendChild(ov);

  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}
</script>
</body>
</html>
